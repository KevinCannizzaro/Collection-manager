<div class="search-box">
    <img src="img/search.png">
    <input 
        id="Live-search" 
        type="search" 
        placeholder="Recherche..." 
        autocomplete="off" 
        [ngModel]="search()"
        (ngModelChange)="updateSearch($event)"
    />
    <button (click)="searchClick()">Search</button>
</div>
